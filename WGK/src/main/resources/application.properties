# ════════════════════════════════════════
# BASE DE DATOS
# ════════════════════════════════════════
spring.datasource.url=jdbc:mysql://localhost:3306/wegot_kicks
spring.datasource.username=wgk_user
spring.datasource.password=Wgk_2026.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ════════════════════════════════════════
# JPA / HIBERNATE
# ════════════════════════════════════════
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ════════════════════════════════════════
# SERVIDOR
# ════════════════════════════════════════
server.port=70

# ════════════════════════════════════════
# INTERNACIONALIZACIÓN
# ════════════════════════════════════════
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# ════════════════════════════════════════
# ARCHIVOS ESTÁTICOS (classpath interno)
# ════════════════════════════════════════
spring.web.resources.static-locations=classpath:/static/

# ════════════════════════════════════════
# MULTIPART — tamaño máximo de subida
# ════════════════════════════════════════
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ════════════════════════════════════════
# CARPETA EXTERNA DE IMÁGENES (Opción C)
# ════════════════════════════════════════
# Esta es la carpeta en tu PC donde se guardarán las imágenes subidas.
# Spring la sirve en la URL /uploads/**
# IMPORTANTE: la carpeta se crea automáticamente si no existe.
# Cambia la ruta si quieres guardarlas en otro lugar.
wgk.imagenes.ruta=C:/wgk-imagenes/