<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <!-- Navbar mínimo sin hero para login -->
        <nav class="wgk-nav navbar px-0">
            <div class="container">
                <a th:href="@{/}" class="wgk-logo">WGK<em style="color:var(--fire);font-style:normal;">.</em></a>
            </div>
        </nav>

        <div class="wgk-login-page">
            <div class="wgk-login-card">
                <span class="wgk-login-logo">WGK<em>.</em></span>
                <p class="wgk-login-sub">Accede a tu cuenta</p>

                <form method="POST" th:action="@{/login}">
                    <div class="mb-4">
                        <label class="wgk-label" for="username">Usuario</label>
                        <input class="wgk-input" type="text" id="username"
                               name="username" placeholder="Ingresa tu usuario"
                               autocomplete="username"/>
                    </div>
                    <div class="mb-5">
                        <label class="wgk-label" for="password">Contraseña</label>
                        <input class="wgk-input" type="password" id="password"
                               name="password" placeholder="••••••••"
                               autocomplete="current-password"/>
                    </div>
                    <button class="wgk-btn w-100 justify-content-center" type="submit"
                            style="padding:13px;font-size:.72rem;margin-bottom:10px;">
                        <i class="fas fa-sign-in-alt"></i>Entrar
                    </button>
                    <a th:href="@{/}" class="wgk-btn-ghost w-100 justify-content-center"
                       style="padding:12px;font-size:.72rem;">
                        <i class="fas fa-arrow-left"></i>Volver al catálogo
                    </a>
                </form>

                <div th:if="${param.error != null}" class="wgk-alert-error">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    Usuario o contraseña incorrectos
                </div>
            </div>
        </div>
    </body>
</html>
