<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <section th:replace="~{general/fragmentos :: mostrarToast}"/>

        <div class="container py-5">

            <!-- Header -->
            <div class="wgk-sec-head mb-5">
                <div>
                    <h2 class="wgk-sec-title">
                        <i class="fas fa-history me-2" style="color:var(--red);"></i>
                        Historial de Pedidos
                    </h2>
                    <p style="color:var(--smoke);font-size:0.78rem;margin-top:6px;">
                        Pedidos realizados por
                        <strong style="color:var(--white);" th:text="${usuario}"></strong>
                    </p>
                </div>
                <a th:href="@{/}" class="wgk-btn-outline"
                   style="font-size:0.75rem;padding:9px 18px;">
                    <i class="fas fa-arrow-left"></i>Volver al catálogo
                </a>
            </div>

            <!-- Sin pedidos -->
            <div th:if="${pedidos == null or pedidos.isEmpty()}" class="wgk-empty">
                <i class="fas fa-receipt"></i>
                <h5>No tienes pedidos aún</h5>
                <p class="mb-4">Cuando realices una compra, aparecerá aquí.</p>
                <a th:href="@{/}" class="wgk-btn-red" style="text-decoration:none;">
                    <i class="fas fa-shoe-prints"></i>Ver Catálogo
                </a>
            </div>

            <!-- Lista de pedidos -->
            <div th:if="${pedidos != null and !pedidos.isEmpty()}"
                 style="display:flex;flex-direction:column;gap:16px;">

                <div th:each="p : ${pedidos}"
                     style="background:var(--bg2);border:1px solid var(--line);
                     border-radius:8px;overflow:hidden;">

                    <!-- Cabecera del pedido -->
                    <div style="background:var(--bg3);padding:14px 20px;
                         display:flex;flex-wrap:wrap;align-items:center;
                         justify-content:space-between;gap:12px;
                         border-bottom:1px solid var(--line);">
                        <div style="display:flex;flex-wrap:wrap;gap:24px;align-items:center;">
                            <div>
                                <div style="font-size:0.6rem;font-weight:700;letter-spacing:2px;
                                     text-transform:uppercase;color:var(--smoke);
                                     margin-bottom:2px;">
                                    Nº Pedido
                                </div>
                                <div style="font-size:0.85rem;font-weight:700;color:var(--white);"
                                     th:text="${p.numero}">WGK-000</div>
                            </div>
                            <div>
                                <div style="font-size:0.6rem;font-weight:700;letter-spacing:2px;
                                     text-transform:uppercase;color:var(--smoke);
                                     margin-bottom:2px;">
                                    Fecha
                                </div>
                                <div style="font-size:0.85rem;color:var(--white);"
                                     th:text="${#temporals.format(p.fecha, 'dd/MM/yyyy HH:mm')}">
                                    01/01/2026
                                </div>
                            </div>
                            <div>
                                <div style="font-size:0.6rem;font-weight:700;letter-spacing:2px;
                                     text-transform:uppercase;color:var(--smoke);
                                     margin-bottom:2px;">
                                    Artículos
                                </div>
                                <div style="font-size:0.85rem;color:var(--white);"
                                     th:text="${p.detalles != null ? p.detalles.size() : 0} + ' par(es)'">
                                </div>
                            </div>
                        </div>
                        <div style="display:flex;align-items:center;gap:12px;">
                            <!-- Badge estado -->
                            <span style="display:inline-flex;align-items:center;gap:6px;
                                  background:rgba(34,197,94,.1);color:#22c55e;
                                  border:1px solid rgba(34,197,94,.25);
                                  font-size:0.65rem;font-weight:700;
                                  padding:4px 10px;border-radius:20px;">
                                <i class="fas fa-check-circle" style="font-size:.6rem;"></i>
                                Pagado
                            </span>
                            <!-- Total -->
                            <div style="text-align:right;">
                                <div style="font-size:0.6rem;font-weight:700;letter-spacing:2px;
                                     text-transform:uppercase;color:var(--smoke);">Total</div>
                                <div style="font-size:1.3rem;font-weight:800;color:var(--white);"
                                     th:text="'$' + ${#numbers.formatDecimal(p.total, 1, 'COMMA', 2, 'POINT')}">
                                    $0
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Detalle de productos -->
                    <div style="padding:0;" th:if="${p.detalles != null and !p.detalles.isEmpty()}">
                        <table style="width:100%;border-collapse:collapse;">
                            <thead>
                                <tr style="background:rgba(255,255,255,.03);">
                                    <th style="padding:10px 20px;font-size:0.6rem;font-weight:700;
                                        letter-spacing:2px;text-transform:uppercase;
                                        color:var(--smoke);text-align:left;
                                        border-bottom:1px solid var(--line);">
                                        Producto
                                    </th>
                                    <th style="padding:10px 20px;font-size:0.6rem;font-weight:700;
                                        letter-spacing:2px;text-transform:uppercase;
                                        color:var(--smoke);text-align:left;
                                        border-bottom:1px solid var(--line);">
                                        Marca
                                    </th>
                                    <th style="padding:10px 20px;font-size:0.6rem;font-weight:700;
                                        letter-spacing:2px;text-transform:uppercase;
                                        color:var(--smoke);text-align:right;
                                        border-bottom:1px solid var(--line);">
                                        Precio
                                    </th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="det, idx : ${p.detalles}"
                                    th:style="${idx.last ? '' : 'border-bottom:1px solid var(--line);'}">
                                    <td style="padding:12px 20px;font-size:0.88rem;
                                        font-weight:600;color:var(--white);"
                                        th:text="${det.descripcion}">Producto</td>
                                    <td style="padding:12px 20px;">
                                        <span style="background:var(--red);color:#fff;
                                              font-size:0.6rem;font-weight:700;
                                              letter-spacing:1.5px;text-transform:uppercase;
                                              padding:2px 8px;border-radius:3px;"
                                              th:text="${det.marca}">Marca</span>
                                    </td>
                                    <td style="padding:12px 20px;font-size:1rem;font-weight:800;
                                        color:var(--white);text-align:right;"
                                        th:text="'$' + ${#numbers.formatDecimal(det.precio, 1, 'COMMA', 2, 'POINT')}">
                                        $0
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>

        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
