<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <section th:replace="~{general/fragmentos :: mostrarToast}"/>

        <div class="container py-5">

            <!-- Section header -->
            <div class="wgk-sec-head mb-4">
                <div>
                    <h2 class="wgk-sec-title">
                        <i class="fas fa-shoe-prints me-2" style="color:var(--red);"></i>
                        Gestión de Sneakers
                    </h2>
                    <p style="color:var(--smoke);font-size:0.75rem;margin-top:4px;">
                        <span th:text="${totalSneakers}">0</span> sneakers registrados en el sistema
                    </p>
                </div>
                <button class="wgk-btn-red"
                        data-bs-toggle="modal"
                        data-bs-target="#modalNuevoSneaker"
                        style="cursor:pointer;">
                    <i class="fas fa-plus"></i>Nuevo Sneaker
                </button>
            </div>

            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3">
                    <div class="wgk-stat">
                        <div class="wgk-stat-num" th:text="${totalSneakers}">0</div>
                        <div class="wgk-stat-label">Total</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="wgk-stat">
                        <div class="wgk-stat-num"
                             th:text="${sneakers != null ? sneakers.stream().filter(s -> s.existencias != null and s.existencias > 0).count() : 0}">
                            0
                        </div>
                        <div class="wgk-stat-label">Con stock</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="wgk-stat">
                        <div class="wgk-stat-num"
                             th:text="${sneakers != null ? sneakers.stream().filter(s -> s.existencias == null or s.existencias == 0).count() : 0}">
                            0
                        </div>
                        <div class="wgk-stat-label">Agotados</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="wgk-stat">
                        <div class="wgk-stat-num"
                             th:text="${sneakers != null ? sneakers.stream().filter(s -> s.activo).count() : 0}">
                            0
                        </div>
                        <div class="wgk-stat-label">Activos</div>
                    </div>
                </div>
            </div>

            <!-- Table -->
            <div style="background:var(--bg2);border:1px solid var(--line);
                 border-radius:8px;overflow:hidden;">
                <table class="wgk-table">
                    <thead>
                        <tr>
                            <th style="width:84px;">Imagen</th>
                            <th>Nombre</th>
                            <th>Marca</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Tallas</th>
                            <th>Estado</th>
                            <th style="width:120px;text-align:center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${sneakers == null or sneakers.isEmpty()}">
                            <td colspan="8" style="text-align:center;padding:56px;
                                color:var(--smoke);">
                                <i class="fas fa-shoe-prints"
                                   style="font-size:2.5rem;display:block;
                                   margin-bottom:12px;color:var(--line);"></i>
                                No hay sneakers registrados aún
                            </td>
                        </tr>
                        <tr th:each="s : ${sneakers}">
                            <td>
                                <img th:src="${s.rutaImagen != null ? s.rutaImagen :
                                     'https://placehold.co/68x68/ebebeb/aaaaaa?text=WGK'}"
                                     width="64" height="64"
                                     style="object-fit:contain;border-radius:6px;
                                     background:#ebebeb;padding:4px;
                                     border:1px solid var(--line);display:block;"/>
                            </td>
                            <td>
                                <div style="font-weight:700;font-size:0.9rem;color:var(--white);"
                                     th:text="${s.descripcion}">Nombre</div>
                                <div style="color:var(--smoke);font-size:0.72rem;margin-top:2px;
                                     max-width:200px;overflow:hidden;text-overflow:ellipsis;
                                     white-space:nowrap;"
                                     th:text="${s.detalle}"></div>
                            </td>
                            <td>
                                <span class="wgk-badge-brand"
                                      th:text="${s.marca != null ? s.marca.descripcion : '—'}">
                                </span>
                            </td>
                            <td>
                                <span style="font-size:1rem;font-weight:800;color:var(--white);"
                                      th:text="'$' + ${#numbers.formatDecimal(s.precio, 1, 'COMMA', 2, 'POINT')}">
                                </span>
                            </td>
                            <td>
                                <span th:if="${s.existencias != null and s.existencias > 0}"
                                      class="wgk-badge-ok"
                                      th:text="${s.existencias} + ' uds.'">Stock</span>
                                <span th:if="${s.existencias == null or s.existencias == 0}"
                                      class="wgk-badge-out">Agotado</span>
                            </td>
                            <td>
                                <span style="color:var(--smoke);font-size:0.75rem;"
                                      th:text="${s.tallas != null ? s.tallas : '—'}">
                                </span>
                            </td>
                            <td>
                                <span th:if="${s.activo}"
                                      style="display:inline-flex;align-items:center;gap:5px;
                                      color:#22c55e;font-size:0.65rem;font-weight:700;
                                      letter-spacing:1px;text-transform:uppercase;">
                                    <i class="fas fa-circle" style="font-size:.4rem;"></i>Activo
                                </span>
                                <span th:if="${!s.activo}"
                                      style="display:inline-flex;align-items:center;gap:5px;
                                      color:var(--smoke);font-size:0.65rem;font-weight:700;
                                      letter-spacing:1px;text-transform:uppercase;">
                                    <i class="fas fa-circle" style="font-size:.4rem;"></i>Inactivo
                                </span>
                            </td>
                            <td style="text-align:center;">
                                <div style="display:flex;align-items:center;
                                     justify-content:center;gap:6px;">
                                    <a th:href="@{/sneaker/modificar/{id}(id=${s.idSneaker})}"
                                       class="wgk-btn-outline"
                                       style="padding:6px 12px;font-size:0.68rem;">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form method="post" th:action="@{/sneaker/eliminar}"
                                          onsubmit="return confirm('¿Eliminar este sneaker?')">
                                        <input type="hidden" name="idSneaker"
                                               th:value="${s.idSneaker}"/>
                                        <button type="submit" class="wgk-btn-red"
                                                style="padding:6px 12px;font-size:0.68rem;
                                                border-radius:6px;">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ════ MODAL: NUEVO SNEAKER ════ -->
        <div class="modal fade" id="modalNuevoSneaker" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fas fa-plus me-2" style="color:var(--red);"></i>
                            Nuevo Sneaker
                        </h5>
                        <button type="button" class="btn-close"
                                data-bs-dismiss="modal"></button>
                    </div>
                    <form method="post" th:action="@{/sneaker/guardar}"
                          enctype="multipart/form-data">
                        <div class="modal-body">
                            <input type="hidden" name="idSneaker" value=""/>

                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="wgk-label">Nombre *</label>
                                    <input type="text" name="descripcion" class="wgk-input"
                                           placeholder="Ej: Air Force 1 White" required/>
                                </div>
                                <div class="col-md-6">
                                    <label class="wgk-label">Marca *</label>
                                    <select name="marca.idMarca" class="wgk-input">
                                        <option th:each="m : ${marcas}"
                                                th:value="${m.idMarca}"
                                                th:text="${m.descripcion}">
                                        </option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="wgk-label">Precio ($) *</label>
                                    <input type="number" step="0.01" name="precio"
                                           class="wgk-input" placeholder="120.00" required/>
                                </div>
                                <div class="col-md-4">
                                    <label class="wgk-label">Existencias</label>
                                    <input type="number" name="existencias"
                                           class="wgk-input" placeholder="10"/>
                                </div>
                                <div class="col-md-4">
                                    <label class="wgk-label">Tallas</label>
                                    <input type="text" name="tallas"
                                           class="wgk-input" placeholder="38,39,40,41"/>
                                </div>
                                <div class="col-12">
                                    <label class="wgk-label">Detalle</label>
                                    <textarea name="detalle" rows="2" class="wgk-input"
                                              placeholder="Describe el sneaker..."></textarea>
                                </div>

                                <!-- File upload -->
                                <div class="col-12">
                                    <label class="wgk-label">Imagen del Sneaker</label>
                                    <div style="border:2px dashed var(--line);border-radius:8px;
                                         padding:18px;text-align:center;cursor:pointer;
                                         transition:border-color .2s;"
                                         id="modalDropZone"
                                         onclick="document.getElementById('modalImagenFile').click()"
                                         ondragover="event.preventDefault();this.style.borderColor='var(--red)'"
                                         ondragleave="this.style.borderColor='var(--line)'"
                                         ondrop="handleModalDrop(event)">
                                        <i class="fas fa-cloud-upload-alt"
                                           style="font-size:1.8rem;color:var(--smoke);
                                           display:block;margin-bottom:6px;"></i>
                                        <p style="color:var(--smoke);font-size:0.8rem;margin:0 0 4px;">
                                            Haz clic o arrastra aquí
                                        </p>
                                        <p style="color:#555;font-size:0.68rem;margin:0;">
                                            JPG, PNG, WEBP · Máx. 50MB
                                        </p>
                                    </div>
                                    <input type="file" name="imagenFile" id="modalImagenFile"
                                           accept="image/*" style="display:none;"
                                           onchange="previewModalFile(this)"/>
                                    <div id="modalPreviewWrap"
                                         style="display:none;margin-top:10px;">
                                        <img id="modalPreviewImg"
                                             style="height:100px;border-radius:6px;
                                             border:2px solid var(--red);
                                             object-fit:contain;background:#ebebeb;
                                             padding:5px;display:block;"/>
                                        <p id="modalPreviewName"
                                           style="color:var(--smoke);font-size:0.7rem;
                                           margin-top:5px;"></p>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div style="display:flex;align-items:center;gap:8px;">
                                        <input type="checkbox" name="activo" value="true"
                                               id="activoNew" checked/>
                                        <label class="wgk-check-label" for="activoNew">
                                            Activo (visible en catálogo)
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="wgk-btn-outline"
                                    data-bs-dismiss="modal">
                                <i class="fas fa-times"></i>Cancelar
                            </button>
                            <button type="submit" class="wgk-btn-red">
                                <i class="fas fa-save"></i>Guardar Sneaker
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script>
            function previewModalFile(input) {
                const file = input.files[0];
                if (!file)
                    return;
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('modalPreviewImg').src = e.target.result;
                    document.getElementById('modalPreviewName').textContent =
                            file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
                    document.getElementById('modalPreviewWrap').style.display = 'block';
                    document.getElementById('modalDropZone').style.borderColor = 'var(--red)';
                };
                reader.readAsDataURL(file);
            }
            function handleModalDrop(event) {
                event.preventDefault();
                const file = event.dataTransfer.files[0];
                if (!file || !file.type.startsWith('image/'))
                    return;
                document.getElementById('modalDropZone').style.borderColor = 'var(--line)';
                const input = document.getElementById('modalImagenFile');
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                previewModalFile(input);
            }
        </script>

        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
