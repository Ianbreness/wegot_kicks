<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <section th:replace="~{general/fragmentos :: mostrarToast}"/>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="wgk-panel">

                        <div class="wgk-panel-head">
                            <i class="fas fa-edit wgk-panel-icon"></i>
                            <h5 th:text="${sneaker.idSneaker != null ? 'Editar Sneaker' : 'Nuevo Sneaker'}">
                                Sneaker
                            </h5>
                        </div>

                        <form method="post" th:action="@{/sneaker/guardar}"
                              enctype="multipart/form-data">
                            <div class="wgk-panel-body">

                                <input type="hidden" name="idSneaker"
                                       th:value="${sneaker.idSneaker}"/>
                                <input type="hidden" name="rutaImagen"
                                       th:value="${sneaker.rutaImagen}"/>

                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label class="wgk-label">Nombre del Sneaker *</label>
                                        <input type="text" name="descripcion" class="wgk-input"
                                               th:value="${sneaker.descripcion}"
                                               placeholder="Ej: Air Force 1 White" required/>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="wgk-label">Marca *</label>
                                        <select name="marca.idMarca" class="wgk-input">
                                            <option th:each="m : ${marcas}"
                                                    th:value="${m.idMarca}"
                                                    th:text="${m.descripcion}"
                                                    th:selected="${sneaker.marca != null and sneaker.marca.idMarca == m.idMarca}">
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="wgk-label">Precio ($) *</label>
                                        <input type="number" step="0.01" name="precio"
                                               class="wgk-input"
                                               th:value="${sneaker.precio}"
                                               placeholder="120.00" required/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="wgk-label">Existencias</label>
                                        <input type="number" name="existencias"
                                               class="wgk-input"
                                               th:value="${sneaker.existencias}"
                                               placeholder="10"/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="wgk-label">Tallas</label>
                                        <input type="text" name="tallas" class="wgk-input"
                                               th:value="${sneaker.tallas}"
                                               placeholder="38,39,40,41,42"/>
                                    </div>
                                    <div class="col-12">
                                        <label class="wgk-label">Descripción / Detalle</label>
                                        <textarea name="detalle" rows="2" class="wgk-input"
                                                  placeholder="Describe el sneaker..."
                                                  th:text="${sneaker.detalle}"></textarea>
                                    </div>

                                    <!-- ── IMAGEN ── -->
                                    <div class="col-12">
                                        <label class="wgk-label">Imagen del Sneaker</label>

                                        <!-- Vista previa de imagen actual -->
                                        <div th:if="${sneaker.rutaImagen != null}"
                                             style="margin-bottom:14px;">
                                            <p style="color:var(--smoke);font-size:0.72rem;
                                               margin-bottom:8px;">
                                                Imagen actual:
                                            </p>
                                            <img th:src="${sneaker.rutaImagen}"
                                                 id="currentImg"
                                                 style="height:120px;border-radius:6px;
                                                 border:1px solid var(--line);
                                                 object-fit:contain;background:#ebebeb;
                                                 padding:6px;display:block;"/>
                                        </div>

                                        <!-- File picker -->
                                        <div style="border:2px dashed var(--line);border-radius:8px;
                                             padding:20px;text-align:center;
                                             transition:border-color .2s;cursor:pointer;"
                                             id="dropZone"
                                             onclick="document.getElementById('imagenFile').click()"
                                             ondragover="event.preventDefault();this.style.borderColor='var(--red)'"
                                             ondragleave="this.style.borderColor='var(--line)'"
                                             ondrop="handleDrop(event)">
                                            <i class="fas fa-cloud-upload-alt"
                                               style="font-size:2rem;color:var(--smoke);
                                               display:block;margin-bottom:8px;"></i>
                                            <p style="color:var(--smoke);font-size:0.82rem;
                                               margin:0 0 4px;">
                                                Haz clic o arrastra una imagen aquí
                                            </p>
                                            <p style="color:#555;font-size:0.7rem;margin:0;">
                                                JPG, PNG, WEBP · Máximo 50MB
                                            </p>
                                        </div>

                                        <input type="file" name="imagenFile" id="imagenFile"
                                               accept="image/*"
                                               style="display:none;"
                                               onchange="previewFile(this)"/>

                                        <!-- Preview de imagen nueva seleccionada -->
                                        <div id="newPreviewWrap"
                                             style="display:none;margin-top:12px;">
                                            <p style="color:var(--smoke);font-size:0.72rem;
                                               margin-bottom:8px;">
                                                Nueva imagen seleccionada:
                                            </p>
                                            <img id="newPreviewImg"
                                                 style="height:120px;border-radius:6px;
                                                 border:2px solid var(--red);
                                                 object-fit:contain;background:#ebebeb;
                                                 padding:6px;display:block;"/>
                                            <p id="newPreviewName"
                                               style="color:var(--smoke);font-size:0.7rem;
                                               margin-top:6px;"></p>
                                        </div>

                                        <p class="wgk-hint">
                                            Si no seleccionas una nueva imagen, se conserva la actual.
                                        </p>
                                    </div>

                                    <div class="col-12">
                                        <div style="display:flex;align-items:center;gap:8px;">
                                            <input type="checkbox" name="activo" value="true"
                                                   id="activoEdit"
                                                   th:checked="${sneaker.activo}"/>
                                            <label class="wgk-check-label" for="activoEdit">
                                                Activo (visible en catálogo)
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="wgk-panel-foot">
                                <a th:href="@{/sneaker/listado}" class="wgk-btn-outline">
                                    <i class="fas fa-arrow-left"></i>Cancelar
                                </a>
                                <button type="submit" class="wgk-btn-red">
                                    <i class="fas fa-save"></i>Guardar Cambios
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function previewFile(input) {
                const file = input.files[0];
                if (!file)
                    return;
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('newPreviewImg').src = e.target.result;
                    document.getElementById('newPreviewName').textContent =
                            file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
                    document.getElementById('newPreviewWrap').style.display = 'block';
                    document.getElementById('dropZone').style.borderColor = 'var(--red)';
                };
                reader.readAsDataURL(file);
            }

            function handleDrop(event) {
                event.preventDefault();
                const file = event.dataTransfer.files[0];
                if (!file || !file.type.startsWith('image/'))
                    return;
                document.getElementById('dropZone').style.borderColor = 'var(--line)';
                const input = document.getElementById('imagenFile');
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(file);
                input.files = dataTransfer.files;
                previewFile(input);
            }
        </script>

        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
