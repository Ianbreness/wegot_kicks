<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card border-0 shadow-sm" style="border-radius:8px;">
                        <div class="card-header modal-header-wgk py-3">
                            <h5 class="mb-0 fw-bold text-uppercase text-white">
                                <i class="fas fa-edit me-2"></i>Editar Sneaker
                            </h5>
                        </div>
                        <form method="post" th:action="@{/sneaker/guardar}"
                              enctype="multipart/form-data">
                            <div class="card-body p-4">
                                <input type="hidden" name="idSneaker"
                                       th:value="${sneaker.idSneaker}"/>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small text-uppercase">
                                            Nombre
                                        </label>
                                        <input type="text" name="descripcion"
                                               class="form-control form-control-wgk"
                                               th:value="${sneaker.descripcion}" required/>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-bold small text-uppercase">
                                            Marca
                                        </label>
                                        <select name="marca.idMarca"
                                                class="form-select form-control-wgk">
                                            <option th:each="m : ${marcas}"
                                                    th:value="${m.idMarca}"
                                                    th:text="${m.descripcion}"
                                                    th:selected="${sneaker.marca != null
                                                    and sneaker.marca.idMarca == m.idMarca}">
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold small text-uppercase">
                                            Precio ($)
                                        </label>
                                        <input type="number" step="0.01" name="precio"
                                               class="form-control form-control-wgk"
                                               th:value="${sneaker.precio}" required/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold small text-uppercase">
                                            Existencias
                                        </label>
                                        <input type="number" name="existencias"
                                               class="form-control form-control-wgk"
                                               th:value="${sneaker.existencias}"/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-bold small text-uppercase">
                                            Tallas
                                        </label>
                                        <input type="text" name="tallas"
                                               class="form-control form-control-wgk"
                                               th:value="${sneaker.tallas}"/>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-bold small text-uppercase">
                                            Detalle
                                        </label>
                                        <textarea name="detalle" rows="2"
                                                  class="form-control form-control-wgk"
                                                  th:text="${sneaker.detalle}">
                                        </textarea>
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-bold small text-uppercase">
                                            Imagen actual
                                        </label>
                                        <img th:src="${sneaker.rutaImagen != null ? sneaker.rutaImagen :
                                             'https://placehold.co/200x100/f8f8f8/111?text=WGK'}"
                                             height="80" class="d-block mb-2 rounded"/>
                                        <input type="file" name="imagenFile"
                                               class="form-control form-control-wgk"
                                               accept="image/*"/>
                                    </div>
                                    <div class="col-12">
                                        <div class="form-check">
                                            <input type="checkbox" name="activo" value="true"
                                                   class="form-check-input"
                                                   th:checked="${sneaker.activo}"/>
                                            <label class="form-check-label fw-bold small text-uppercase">
                                                Activo
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="card-footer bg-white border-0 d-flex
                                 justify-content-between p-4">
                                <a th:href="@{/sneaker/listado}"
                                   class="btn btn-wgk-outline">Cancelar</a>
                                <button type="submit" class="btn btn-wgk">
                                    <i class="fas fa-save me-1"></i>Guardar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
