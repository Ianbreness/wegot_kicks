<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <section th:replace="~{general/fragmentos :: mostrarToast}"/>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="wgk-panel">
                        <div class="wgk-panel-head">
                            <i class="fas fa-edit wgk-panel-icon"></i>
                            <h5 th:text="${sneaker.idSneaker != null ? 'Editar Sneaker' : 'Nuevo Sneaker'}">
                                Sneaker
                            </h5>
                        </div>

                        <form method="post" th:action="@{/sneaker/guardar}" enctype="multipart/form-data">
                            <div class="wgk-panel-body">
                                <input type="hidden" name="idSneaker" th:value="${sneaker.idSneaker}"/>

                                <div class="row g-4">
                                    <div class="col-md-6">
                                        <label class="wgk-label">Nombre del Sneaker</label>
                                        <input type="text" name="descripcion" class="wgk-input"
                                               th:value="${sneaker.descripcion}"
                                               placeholder="Ej: Air Force 1 White" required/>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="wgk-label">Marca</label>
                                        <select name="marca.idMarca" class="wgk-input">
                                            <option th:each="m : ${marcas}"
                                                    th:value="${m.idMarca}"
                                                    th:text="${m.descripcion}"
                                                    th:selected="${sneaker.marca != null and sneaker.marca.idMarca == m.idMarca}">
                                            </option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="wgk-label">Precio ($)</label>
                                        <input type="number" step="0.01" name="precio" class="wgk-input"
                                               th:value="${sneaker.precio}" placeholder="120.00" required/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="wgk-label">Existencias</label>
                                        <input type="number" name="existencias" class="wgk-input"
                                               th:value="${sneaker.existencias}" placeholder="10"/>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="wgk-label">Tallas</label>
                                        <input type="text" name="tallas" class="wgk-input"
                                               th:value="${sneaker.tallas}" placeholder="38,39,40,41,42"/>
                                    </div>
                                    <div class="col-12">
                                        <label class="wgk-label">Descripción / Detalle</label>
                                        <textarea name="detalle" rows="2" class="wgk-input"
                                                  placeholder="Describe el sneaker..."
                                                  th:text="${sneaker.detalle}"></textarea>
                                    </div>
                                    <div class="col-12">
                                        <label class="wgk-label">URL de la imagen</label>
                                        <input type="text" name="rutaImagen" class="wgk-input"
                                               th:value="${sneaker.rutaImagen}"
                                               placeholder="https://images.unsplash.com/..."/>
                                        <p class="wgk-hint">Pega la URL directa de la imagen (Unsplash, etc.)</p>
                                        <div th:if="${sneaker.rutaImagen != null}" style="margin-top:10px;">
                                            <img th:src="${sneaker.rutaImagen}"
                                                 style="height:90px;border-radius:3px;border:1px solid var(--line);object-fit:cover;"/>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <input type="hidden" name="imagenFile" value=""/>
                                        <div class="d-flex align-items-center">
                                            <input type="checkbox" name="activo" value="true" id="activoCheck"
                                                   th:checked="${sneaker.activo}"/>
                                            <label class="wgk-check-label" for="activoCheck">Activo</label>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="wgk-panel-foot">
                                <a th:href="@{/sneaker/listado}" class="wgk-btn-ghost">
                                    <i class="fas fa-arrow-left"></i>Cancelar
                                </a>
                                <button type="submit" class="wgk-btn">
                                    <i class="fas fa-save"></i>Guardar Sneaker
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
