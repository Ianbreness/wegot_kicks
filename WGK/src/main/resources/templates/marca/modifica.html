<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <section th:replace="~{general/fragmentos :: mostrarToast}"/>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="wgk-panel">
                        <div class="wgk-panel-head">
                            <i class="fas fa-tag wgk-panel-icon"></i>
                            <h5 th:text="${marca.idMarca != null ? 'Editar Marca' : 'Nueva Marca'}">Marca</h5>
                        </div>

                        <form method="post" th:action="@{/marca/guardar}" enctype="multipart/form-data">
                            <div class="wgk-panel-body">
                                <input type="hidden" name="idMarca" th:value="${marca.idMarca}"/>

                                <div class="mb-4">
                                    <label class="wgk-label">Nombre de la Marca</label>
                                    <input type="text" name="descripcion" class="wgk-input"
                                           th:value="${marca.descripcion}"
                                           placeholder="Ej: Nike" required/>
                                </div>

                                <div class="mb-4">
                                    <label class="wgk-label">URL de imagen</label>
                                    <input type="text" name="rutaImagen" class="wgk-input"
                                           th:value="${marca.rutaImagen}"
                                           placeholder="https://images.unsplash.com/..."/>
                                    <p class="wgk-hint">Pega la URL directa del logo o imagen de la marca.</p>
                                    <div th:if="${marca.rutaImagen != null}" style="margin-top:10px;">
                                        <img th:src="${marca.rutaImagen}"
                                             style="height:80px;border-radius:3px;border:1px solid var(--line);object-fit:cover;"/>
                                    </div>
                                </div>

                                <div class="d-flex align-items-center">
                                    <input type="checkbox" name="activo" value="true" id="activoCheck"
                                           th:checked="${marca.activo}"/>
                                    <label class="wgk-check-label" for="activoCheck">Activo</label>
                                </div>
                            </div>
                            <div class="wgk-panel-foot">
                                <a th:href="@{/marca/listado}" class="wgk-btn-ghost">
                                    <i class="fas fa-arrow-left"></i>Cancelar
                                </a>
                                <button type="submit" class="wgk-btn">
                                    <i class="fas fa-save"></i>Guardar Marca
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <footer th:replace="~{general/fragmentos :: footer}"/>
    </body>
</html>
