<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <section th:replace="~{general/fragmentos :: mostrarToast}"/>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="wgk-panel">
                        <div class="wgk-panel-head">
                            <i class="fas fa-tag wgk-panel-icon"></i>
                            <h5 th:text="${marca.idMarca != null ? 'Editar Marca' : 'Nueva Marca'}">Marca</h5>
                        </div>

                        <form method="post" th:action="@{/marca/guardar}">
                            <div class="wgk-panel-body">
                                <input type="hidden" name="idMarca" th:value="${marca.idMarca}"/>

                                <div class="mb-4">
                                    <label class="wgk-label">Nombre de la Marca</label>
                                    <input type="text" name="descripcion" class="wgk-input"
                                           th:value="${marca.descripcion}"
                                           placeholder="Ej: Nike" required/>
                                </div>

                                <div class="mb-4">
                                    <label class="wgk-label">URL de Imagen / Logo</label>
                                    <div style="display:flex;gap:12px;align-items:flex-start;">
                                        <div style="flex:1;">
                                            <input type="text" name="rutaImagen" id="rutaInput"
                                                   class="wgk-input"
                                                   th:value="${marca.rutaImagen}"
                                                   placeholder="https://... o /img/logo.png"
                                                   oninput="preview(this.value)"/>
                                            <p class="wgk-hint">
                                                Pega la URL del logo. Puedes usar Google Images
                                                (clic derecho → copiar dirección de imagen).
                                            </p>
                                        </div>
                                        <img id="prevImg"
                                             th:src="${marca.rutaImagen}"
                                             th:style="${marca.rutaImagen != null} ? 'display:block' : 'display:none'"
                                             style="width:90px;height:90px;object-fit:contain;
                                             flex-shrink:0;border-radius:8px;
                                             border:2px solid var(--red);
                                             background:#f4f4f4;padding:4px;"/>
                                    </div>
                                </div>

                                <div class="d-flex align-items-center">
                                    <input type="checkbox" name="activo" value="true" id="activoCheck"
                                           th:checked="${marca.activo}"/>
                                    <label class="wgk-check-label" for="activoCheck">Activo</label>
                                </div>
                            </div>
                            <div class="wgk-panel-foot">
                                <a th:href="@{/marca/listado}" class="wgk-btn-outline">
                                    <i class="fas fa-arrow-left"></i>Cancelar
                                </a>
                                <button type="submit" class="wgk-btn-red">
                                    <i class="fas fa-save"></i>Guardar Marca
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <footer th:replace="~{general/fragmentos :: footer}"/>
        <script>
            function preview(url) {
                const img = document.getElementById('prevImg');
                if (url.trim()) {
                    img.src = url;
                    img.style.display = 'block';
                } else {
                    img.style.display = 'none';
                }
            }
        </script>
    </body>
</html>
