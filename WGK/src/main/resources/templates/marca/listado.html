<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>

        <style>
            .marca-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 16px;
            }
            .marca-card {
                background: var(--bg2);
                border: 1px solid var(--line);
                border-radius: 10px;
                overflow: hidden;
                transition: border-color .2s, transform .2s;
            }
            .marca-card:hover {
                border-color: #444;
                transform: translateY(-2px);
            }
            .marca-card-img {
                background: #f4f4f4;
                height: 130px;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 16px;
            }
            .marca-card-img img {
                max-height: 100px;
                max-width: 100%;
                object-fit: contain;
            }
            .marca-card-body {
                padding: 12px 14px;
            }
            .marca-card-nombre {
                font-size: 0.95rem;
                font-weight: 700;
                color: var(--white);
                margin-bottom: 4px;
            }
            .marca-card-info {
                font-size: 0.72rem;
                color: var(--smoke);
                margin-bottom: 10px;
            }
            .marca-card-footer {
                display: flex;
                gap: 8px;
                padding: 10px 14px;
                border-top: 1px solid var(--line);
                background: var(--bg3);
            }
        </style>

        <div class="container py-4">

            <!-- Header -->
            <div class="d-flex align-items-center justify-content-between mb-4">
                <div>
                    <h2 style="font-family:var(--disp);font-size:1.4rem;letter-spacing:3px;
                        text-transform:uppercase;color:var(--white);margin:0;">
                        Marcas
                    </h2>
                    <span style="color:var(--smoke);font-size:0.75rem;"
                          th:text="${totalMarcas} + ' marcas registradas'"></span>
                </div>
                <button id="btnNuevaMarca" class="wgk-btn-red"
                        data-bs-toggle="modal" data-bs-target="#modalNuevaMarca">
                    <i class="fas fa-plus"></i>Nueva Marca
                </button>
            </div>

            <!-- Empty state -->
            <div th:if="${marcas == null or marcas.isEmpty()}" class="wgk-empty">
                <i class="fas fa-tag"></i>
                <h5>No hay marcas aún</h5>
                <p>Agrega tu primera marca con el botón de arriba.</p>
            </div>

            <!-- Grid de marcas -->
            <div class="marca-grid" th:if="${marcas != null and !marcas.isEmpty()}">
                <div th:each="m : ${marcas}" class="marca-card">

                    <!-- Imagen -->
                    <div class="marca-card-img">
                        <img th:src="${m.rutaImagen != null ? m.rutaImagen :
                             'https://placehold.co/200x100/f4f4f4/aaa?text=' + m.descripcion}"
                             th:alt="${m.descripcion}"/>
                    </div>

                    <!-- Info -->
                    <div class="marca-card-body">
                        <div class="marca-card-nombre" th:text="${m.descripcion}">Marca</div>
                        <div class="marca-card-info">
                            <span th:text="${m.sneakers != null ? m.sneakers.size() : 0}">0</span>
                            modelos ·
                            <span th:if="${m.activo}"
                                  style="color:var(--green);font-weight:700;">Activa</span>
                            <span th:if="${!m.activo}"
                                  style="color:var(--smoke);font-weight:700;">Inactiva</span>
                        </div>
                    </div>

                    <!-- Acciones -->
                    <div class="marca-card-footer">
                        <a th:href="@{/marca/modificar/{id}(id=${m.idMarca})}"
                           class="wgk-btn-outline"
                           style="flex:1;justify-content:center;padding:8px;font-size:0.72rem;">
                            <i class="fas fa-edit"></i>Editar
                        </a>
                        <form method="post" th:action="@{/marca/eliminar}"
                              onsubmit="return confirm('¿Eliminar esta marca?')"
                              class="m-0">
                            <input type="hidden" name="idMarca" th:value="${m.idMarca}"/>
                            <button type="submit"
                                    style="background:rgba(255,0,0,.12);color:var(--red);
                                    border:1px solid rgba(255,0,0,.2);padding:8px 12px;
                                    border-radius:6px;cursor:pointer;font-size:0.72rem;
                                    transition:all .2s;"
                                    onmouseover="this.style.background = 'var(--red)';this.style.color = '#fff'"
                                    onmouseout="this.style.background = 'rgba(255,0,0,.12)';this.style.color = 'var(--red)'">
                                <i class="fas fa-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- ════ MODAL NUEVA MARCA ════ -->
        <div class="modal fade" id="modalNuevaMarca" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fas fa-tag me-2" style="color:var(--red);"></i>
                            Nueva Marca
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form method="post" th:action="@{/marca/guardar}"
                          enctype="multipart/form-data" onsubmit="limpiarInputsVacios(this)">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="wgk-label">Nombre de la Marca *</label>
                                <input type="text" name="descripcion" class="wgk-input"
                                       placeholder="Ej: Nike" required/>
                            </div>
                            <div class="mb-3">
                                <label class="wgk-label">Logo / Imagen</label>
                                <div style="border:2px dashed var(--line);border-radius:8px;
                                     padding:18px;text-align:center;cursor:pointer;
                                     transition:border-color .2s;"
                                     id="marcaDropZone"
                                     onclick="document.getElementById('marcaImgFile').click()"
                                     ondragover="event.preventDefault();this.style.borderColor='var(--red)'"
                                     ondragleave="this.style.borderColor='var(--line)'"
                                     ondrop="handleMarcaDrop(event)">
                                    <i class="fas fa-image"
                                       style="font-size:1.8rem;color:var(--smoke);display:block;margin-bottom:6px;"></i>
                                    <p style="color:var(--smoke);font-size:0.8rem;margin:0;">
                                        Haz clic o arrastra el logo aquí
                                    </p>
                                </div>
                                <input type="file" name="imagenFile" id="marcaImgFile"
                                       accept="image/*" style="display:none;"
                                       onchange="previewMarca(this)"/>
                                <img id="marcaPrev"
                                     style="display:none;margin-top:10px;max-height:100px;
                                     border-radius:8px;border:2px solid var(--red);
                                     object-fit:contain;background:#f4f4f4;padding:6px;"/>
                            </div>
                            <div class="d-flex align-items-center gap-2">
                                <input type="checkbox" name="activo" value="true"
                                       id="activaMarca" checked/>
                                <label class="wgk-check-label" for="activaMarca">
                                    Activa (visible en catálogo)
                                </label>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="wgk-btn-outline" data-bs-dismiss="modal">
                                <i class="fas fa-times"></i>Cancelar
                            </button>
                            <button type="submit" class="wgk-btn-red">
                                <i class="fas fa-save"></i>Guardar Marca
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <footer th:replace="~{general/fragmentos :: footer}"/>

        <script>
            function previewMarca(input) {
                const file = input.files[0];
                if (!file)
                    return;
                const reader = new FileReader();
                reader.onload = e => {
                    const prev = document.getElementById('marcaPrev');
                    prev.src = e.target.result;
                    prev.style.display = 'block';
                    document.getElementById('marcaDropZone').style.borderColor = 'var(--red)';
                };
                reader.readAsDataURL(file);
            }

            function handleMarcaDrop(event) {
                event.preventDefault();
                const file = event.dataTransfer.files[0];
                if (!file || !file.type.startsWith('image/'))
                    return;
                const input = document.getElementById('marcaImgFile');
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                previewMarca(input);
            }

            document.addEventListener('DOMContentLoaded', function () {
                const btn = document.getElementById('btnNuevaMarca');
                const modalEl = document.getElementById('modalNuevaMarca');
                if (btn && modalEl && typeof bootstrap !== 'undefined') {
                    btn.addEventListener('click', function () {
                        new bootstrap.Modal(modalEl).show();
                    });
                }
            });
        </script>
    </body>
</html>
