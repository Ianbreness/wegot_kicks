<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
    <head th:replace="~{general/fragmentos :: head}"/>
    <body>
        <header th:replace="~{general/fragmentos :: header}"/>
        <section th:replace="~{general/fragmentos :: mostrarToast}"/>

        <!-- CARRUSEL DINÁMICO - usa carruselSneakers del controller -->
        <div class="wgk-carousel"
             th:if="${carruselSneakers != null and !carruselSneakers.isEmpty()}">

            <div th:each="s, idx : ${carruselSneakers}"
                 class="wgk-slide"
                 th:classappend="${idx.first} ? ' active' : ''"
                 style="background:linear-gradient(135deg,#0d1117 60%,#1a0505 100%);">
                <div class="wgk-slide-content">
                    <div class="wgk-slide-eye"
                         th:text="${s.marca != null ? s.marca.descripcion + ' · Exclusivo' : 'Nuevo Drop'}">
                    </div>
                    <div class="wgk-slide-title" th:text="${s.descripcion}">Sneaker</div>
                    <div class="wgk-slide-sub"
                         th:text="${s.detalle != null ? s.detalle : '100% Legit Certified'}">
                    </div>
                    <a th:href="@{/sneaker/detalle/{id}(id=${s.idSneaker})}"
                       class="wgk-slide-btn">
                        Comprar Ahora <i class="fas fa-arrow-right ms-1"></i>
                    </a>
                </div>
                <div class="wgk-slide-img">
                    <img th:src="${s.rutaImagen != null ? s.rutaImagen :
                         'https://placehold.co/700x700/f4f4f4/aaa?text=WGK'}"
                         th:alt="${s.descripcion}"/>
                </div>
            </div>

            <div class="wgk-carousel-brands">
                <span th:each="s, idx : ${carruselSneakers}"
                      th:text="${s.descripcion}"
                      th:classappend="${idx.first} ? ' active' : ''"
                      th:onclick="'goSlide(' + ${idx.index} + ')'">
                </span>
            </div>

            <button class="wgk-ctrl prev" onclick="changeSlide(-1)">&#8249;</button>
            <button class="wgk-ctrl next" onclick="changeSlide(1)">&#8250;</button>

            <div class="wgk-dots">
                <button th:each="s, idx : ${carruselSneakers}"
                        class="wgk-dot"
                        th:classappend="${idx.first} ? ' active' : ''"
                        th:onclick="'goSlide(' + ${idx.index} + ')'">
                </button>
            </div>
        </div>

        <!-- CATÁLOGO -->
        <div class="container py-5">

            <!-- Filtros por marca -->
            <div class="wgk-filter-row">
                <a class="wgk-filter-btn active" th:href="@{/}">Todos</a>
                <a class="wgk-filter-btn"
                   th:each="m : ${marcas}"
                   th:href="@{/marca/{id}(id=${m.idMarca})}"
                   th:text="${m.descripcion}"
                   th:classappend="${idMarcaActual != null and idMarcaActual == m.idMarca} ? ' active' : ''">
                </a>
            </div>

            <!-- Encabezado -->
            <div class="wgk-sec-head mb-4">
                <h2 class="wgk-sec-title">
                    <span th:if="${busqueda == null}">Catálogo Completo</span>
                    <span th:if="${busqueda != null}">
                        Resultados para: &ldquo;<span th:text="${busqueda}"></span>&rdquo;
                    </span>
                </h2>
                <span class="wgk-count"
                      th:text="${sneakers != null ? sneakers.size() + ' modelos' : '0 modelos'}">
                </span>
            </div>

            <!-- Grid de productos -->
            <div class="wgk-product-grid"
                 th:if="${sneakers != null and !sneakers.isEmpty()}">
                <div th:each="s : ${sneakers}">
                    <div class="wgk-card">

                        <button class="wgk-card-fav" type="button">
                            <i class="far fa-heart"></i>
                        </button>

                        <a th:href="@{/sneaker/detalle/{id}(id=${s.idSneaker})}"
                           target="_blank" style="display:block;text-decoration:none;">
                            <div class="wgk-card-img-wrap">
                                <img class="wgk-card-img"
                                     th:src="${s.rutaImagen != null ? s.rutaImagen :
                                     'https://placehold.co/400x400/f4f4f4/aaaaaa?text=WGK'}"
                                     th:alt="${s.descripcion}"
                                     loading="lazy"/>
                            </div>
                        </a>

                        <div class="wgk-card-info">
                            <div class="wgk-card-brand"
                                 th:text="${s.marca != null ? s.marca.descripcion : 'WGK'}">
                            </div>
                            <div class="wgk-card-name" th:text="${s.descripcion}">Nombre</div>
                            <div class="wgk-card-sizes"
                                 th:text="${s.tallas != null ? 'Tallas: ' + s.tallas : ''}">
                            </div>
                            <div class="wgk-card-price-label">Precio</div>
                            <div class="wgk-card-price"
                                 th:text="'$' + ${#numbers.formatDecimal(s.precio, 1, 'COMMA', 2, 'POINT')}">
                            </div>
                            <span th:if="${s.existencias != null and s.existencias > 0}"
                                  class="wgk-card-stock-ok"
                                  th:text="${s.existencias} + ' disponibles'">
                            </span>
                            <span th:if="${s.existencias == null or s.existencias == 0}"
                                  class="wgk-card-stock-out">Agotado</span>
                        </div>

                        <form method="post"
                              th:action="@{/carrito/agregar/{id}(id=${s.idSneaker})}">
                            <button class="wgk-card-btn"
                                    th:disabled="${s.existencias == null or s.existencias == 0}">
                                <i class="fas fa-shopping-bag"></i>Agregar al carrito
                            </button>
                        </form>

                    </div>
                </div>
            </div>

            <!-- Estado vacío -->
            <div th:if="${sneakers == null or sneakers.isEmpty()}" class="wgk-empty">
                <i class="fas fa-shoe-prints"></i>
                <h5>No hay sneakers disponibles</h5>
                <p>Vuelve pronto para ver los nuevos drops.</p>
            </div>

        </div>

        <footer th:replace="~{general/fragmentos :: footer}"/>

        <script>
            let cur = 0;
            const slides = document.querySelectorAll('.wgk-slide');
            const dots = document.querySelectorAll('.wgk-dot');
            const brands = document.querySelectorAll('.wgk-carousel-brands span');

            function goSlide(n) {
                if (!slides.length)
                    return;
                slides[cur].classList.remove('active');
                if (dots[cur])
                    dots[cur].classList.remove('active');
                if (brands[cur])
                    brands[cur].classList.remove('active');
                cur = (n + slides.length) % slides.length;
                slides[cur].classList.add('active');
                if (dots[cur])
                    dots[cur].classList.add('active');
                if (brands[cur])
                    brands[cur].classList.add('active');
            }
            function changeSlide(d) {
                goSlide(cur + d);
            }
            if (slides.length > 1)
                setInterval(() => changeSlide(1), 5000);

            document.querySelectorAll('.wgk-card-fav').forEach(btn => {
                btn.addEventListener('click', function () {
                    const icon = this.querySelector('i');
                    icon.classList.toggle('far');
                    icon.classList.toggle('fas');
                    this.style.color = icon.classList.contains('fas') ? 'var(--red)' : '#ccc';
                });
            });
        </script>
    </body>
</html>
